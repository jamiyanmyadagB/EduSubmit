apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: edusubmit-backend-hpa
  namespace: edusubmit-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: edusubmit-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: edusubmit-frontend-hpa
  namespace: edusubmit-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: edusubmit-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
