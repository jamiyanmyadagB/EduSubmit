apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-pv
  namespace: edusubmit-staging
  labels:
    type: local
    app: mysql
    environment: staging
spec:
  storageClassName: manual
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/mnt/data/mysql-staging"
---
