apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healing-test
  namespace: edusubmit-staging
  labels:
    app: self-healing-test
    environment: staging
spec:
  replicas: 3
  selector:
    matchLabels:
      app: self-healing-test
  template:
    metadata:
      labels:
        app: self-healing-test
        environment: staging
    spec:
      containers:
      - name: nginx-test
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: self-healing-test-service
  namespace: edusubmit-staging
  labels:
    app: self-healing-test
    environment: staging
spec:
  selector:
    app: self-healing-test
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  type: ClusterIP
