apiVersion: v1
kind: ConfigMap
metadata:
  name: edusubmit-config
  namespace: edusubmit-staging
  labels:
    app: edusubmit
    environment: staging
data:
  SPRING_PROFILES_ACTIVE: "staging"
  EUREKA_CLIENT_SERVICE_URL: "http://eureka-service:8761/eureka"
  SPRING_REDIS_HOST: "redis-service"
  SPRING_REDIS_PORT: "6379"
  JAVA_OPTS: "-Xmx512m -Xms256m -XX:+UseG1GC -XX:+UseContainerSupport"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: edusubmit-monitoring
  labels:
    app: prometheus
    environment: staging
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    rule_files:
      - "alert_rules.yml"
    
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093
    
    scrape_configs:
      - job_name: 'edusubmit-services'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: 
            - 'api-gateway:8080'
            - 'auth-service:8081'
            - 'assignment-service:8082'
            - 'submission-service:8083'
            - 'grading-service:8084'
            - 'notification-service:8085'
            - 'exam-schedule-service:8086'
      
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
