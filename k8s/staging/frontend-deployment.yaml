apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: edusubmit-staging
  labels:
    app: frontend
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        environment: staging
    spec:
      imagePullSecrets:
      - name: docker-registry-secret
      containers:
      - name: frontend
        image: edusubmit/frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        env:
        - name: REACT_APP_API_BASE_URL
          value: "https://edusubmit.cloud-ip.cc/api"
        - name: REACT_APP_AUTH_BASE_URL
          value: "https://edusubmit.cloud-ip.cc/auth"
        - name: REACT_APP_ENABLE_AI_GRADING
          value: "true"
        - name: REACT_APP_ENABLE_PLAGIARISM_DETECTION
          value: "true"
        - name: REACT_APP_ENABLE_EMAIL_NOTIFICATIONS
          value: "true"
        - name: REACT_APP_DEBUG
          value: "false"
        - name: REACT_APP_LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: edusubmit-staging
  labels:
    app: frontend
    environment: staging
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
