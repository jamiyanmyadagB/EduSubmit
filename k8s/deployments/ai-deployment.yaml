apiVersion: apps/v1
kind: Deployment
metadata:
  name: edusubmit-ai
  namespace: edusubmit-production
  labels:
    app: edusubmit-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edusubmit-ai
  template:
    metadata:
      labels:
        app: edusubmit-ai
    spec:
      containers:
        - name: ai-engine
          image: edusubmit/ai-engine:latest
          ports:
            - containerPort: 5000
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
