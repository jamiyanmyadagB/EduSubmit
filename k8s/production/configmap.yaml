apiVersion: v1
kind: ConfigMap
metadata:
  name: edusubmit-config
  namespace: edusubmit-production
  labels:
    app: edusubmit
    environment: production
data:
  SPRING_PROFILES_ACTIVE: "production"
  # EUREKA_CLIENT_SERVICE_URL: "http://eureka-prod:8761/eureka"
  SPRING_REDIS_HOST: "redis-service"
  SPRING_REDIS_PORT: "6379"
  JAVA_OPTS: "-Xmx1024m -Xms512m -XX:+UseG1GC -XX:+UseContainerSupport -XX:+HeapDumpOnOutOfMemoryError"
  LOG_LEVEL_GATEWAY: "INFO"
  LOG_LEVEL_WEB: "INFO"
  LOG_LEVEL_APP: "INFO"
  
  # Production-specific settings
  SERVER_TOMCAT_MAX_THREADS: "200"
  SERVER_TOMCAT_MIN_SPARE_THREADS: "10"
  SERVER_CONNECTION_TIMEOUT: "20000"
  
  # Rate limiting for production
  RATE_LIMIT_REQUESTS_PER_SECOND: "200"
  RATE_LIMIT_BURST_CAPACITY: "500"
  
  # Circuit breaker settings
  CIRCUIT_BREAKER_FAILURE_THRESHOLD: "100"
  CIRCUIT_BREAKER_TIMEOUT_DURATION: "60s"
  CIRCUIT_BREAKER_RECOVERY_TIMEOUT: "120s"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: edusubmit-production
  labels:
    app: prometheus
    environment: production
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'edusubmit-production'
        environment: 'production'
    
    rule_files:
      - "/etc/prometheus/alert_rules.yml"
    
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093
    
    scrape_configs:
      - job_name: 'edusubmit-services'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: 
            - 'api-gateway:8080'
            - 'auth-service:8081'
        scrape_interval: 10s
        scrape_timeout: 5s
      
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      
      - job_name: 'mysql-exporter'
        static_configs:
          - targets: ['mysql-exporter:9104']
      
      - job_name: 'redis-exporter'
        static_configs:
          - targets: ['redis-exporter:9121']
      
      - job_name: 'node-exporter'
        static_configs:
          - targets: ['node-exporter:9100']
  
  alert_rules.yml: |
    groups:
      - name: production.rules
        rules:
          - alert: ProductionServiceDown
            expr: up{job=~"edusubmit-services"} == 0
            for: 30s
            labels:
              severity: critical
              environment: production
            annotations:
              summary: "Production service {{ $labels.job }} is down"
              description: "Production service {{ $labels.job }} has been down for more than 30 seconds."
          
          - alert: ProductionHighErrorRate
            expr: rate(http_requests_total{job=~"edusubmit-services",status=~"5.."}[2m]) > 0.05
            for: 2m
            labels:
              severity: critical
              environment: production
            annotations:
              summary: "High error rate in production"
              description: "Error rate is {{ $value }} errors per second on {{ $labels.job }}."
