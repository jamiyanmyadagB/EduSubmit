apiVersion: v1
kind: ResourceQuota
metadata:
  name: edusubmit-production-quota
  namespace: edusubmit-production
  labels:
    app: edusubmit
    environment: production
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    persistentvolumeclaims: "10"
    pods: "50"
    services: "20"
    secrets: "20"
    configmaps: "20"
    count/deployments.apps: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: edusubmit-production-limits
  namespace: edusubmit-production
  labels:
    app: edusubmit
    environment: production
spec:
  limits:
  - default:
      cpu: "500m"
      memory: "1Gi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    type: Container
  - max:
      cpu: "2"
      memory: "4Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    type: Container
  - max:
      storage: 10Gi
    min:
      storage: 100Mi
    type: PersistentVolumeClaim
