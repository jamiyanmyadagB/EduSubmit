apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edusubmit-ingress
  namespace: edusubmit-production
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - yourdomain.com
    secretName: edusubmit-prod-tls
  rules:
  - host: yourdomain.com
    http:
      paths:
      - path: /api/auth(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 8081
      # Additional services - Uncomment when deployments are added
      # - path: /api/assignments(/|$)(.*)
      #   pathType: Prefix
      #   backend:
      #     service:
      #       name: assignment-service
      #       port:
      #         number: 8082
      # - path: /api/submissions(/|$)(.*)
      #   pathType: Prefix
      #   backend:
      #     service:
      #       name: submission-service
      #       port:
      #         number: 8083
      # - path: /api/grading(/|$)(.*)
      #   pathType: Prefix
      #   backend:
      #     service:
      #       name: grading-service
      #       port:
      #         number: 8084
      # - path: /api/notifications(/|$)(.*)
      #   pathType: Prefix
      #   backend:
      #     service:
      #       name: notification-service
      #       port:
      #         number: 8085
      # - path: /api/exam-schedule(/|$)(.*)
      #   pathType: Prefix
      #   backend:
      #     service:
      #       name: exam-schedule-service
      #       port:
      #         number: 8086
      - path: /(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 8080
