---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: edusubmit-production
  labels:
    app: auth-service
    environment: production
spec:
  selector:
    app: auth-service
  ports:
  - port: 8081
    targetPort: 8081
  type: ClusterIP
