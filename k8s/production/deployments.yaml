          value: "auth-service"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/edusubmit_production"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: edusubmit-secrets
              key: mysql-user
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: edusubmit-secrets
              key: mysql-password
        - name: APP_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: edusubmit-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "512Mi"
            cpu: "300m"
          limits:
            memory: "1Gi"
            cpu: "600m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
