# ═══════════════════════════════════════════
# EduSubmit Docker Compose
# Complete stack with all services
# ═══════════════════════════════════════════

version: "3.8"

services:
  # ─── MySQL Database ───
  mysql:
    image: mysql:8.0
    container_name: edusubmit-mysql
    environment:
      MYSQL_ROOT_PASSWORD: edusubmit_root_pass
      MYSQL_DATABASE: edusubmit
      MYSQL_USER: edusubmit
      MYSQL_PASSWORD: edusubmit_pass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pedusubmit_root_pass"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── Redis Cache ───
  redis:
    image: redis:7-alpine
    container_name: edusubmit-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── EduSubmit Backend (API + Frontend) ───
  edusubmit-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edusubmit-backend
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: mysql://edusubmit:edusubmit_pass@mysql:3306/edusubmit
      JWT_SECRET: edusubmit-jwt-secret-change-in-production-256-bits
      AI_ENGINE_URL: http://ai-engine:5000
      UPLOAD_DIR: /app/uploads
      APP_ID: ${APP_ID}
      APP_SECRET: ${APP_SECRET}
      KIMI_AUTH_URL: ${KIMI_AUTH_URL}
      KIMI_OPEN_URL: ${KIMI_OPEN_URL}
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/trpc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── AI Engine ───
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: edusubmit-ai
    environment:
      PORT: "5000"
      DEBUG: "false"
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── Prometheus ───
  prometheus:
    image: prom/prometheus:latest
    container_name: edusubmit-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── Grafana ───
  grafana:
    image: grafana/grafana:latest
    container_name: edusubmit-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3001"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    ports:
      - "3001:3001"
    depends_on:
      - prometheus
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── Elasticsearch ───
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: edusubmit-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── Logstash ───
  logstash:
    image: logstash:8.11.0
    container_name: edusubmit-logstash
    volumes:
      - ./elk/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── Kibana ───
  kibana:
    image: kibana:8.11.0
    container_name: edusubmit-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── HashiCorp Vault ───
  vault:
    image: vault:1.15
    container_name: edusubmit-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: myroot
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    networks:
      - edusubmit-net
    restart: unless-stopped

# ─── Networks ───
networks:
  edusubmit-net:
    driver: bridge

# ─── Volumes ───
volumes:
  mysql_data:
  grafana_data:
  prometheus_data:
  elasticsearch_data:
  uploads:
