# version: "3.8"

services:
  # ─── New Microservices Stack (Updated for Local Builds) ───
  eureka-server:
    build:
      context: ./edusubmit-backend/eureka-server
      dockerfile: Dockerfile
    image: edusubmit/eureka-server:latest
    container_name: edusubmit-eureka
    ports:
      - "8761:8761"
    environment:
      - SERVICE_TO_START=eureka-server
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - edusubmit-net
    restart: unless-stopped

  auth-service:
    build:
      context: ./edusubmit-backend/auth-service
      dockerfile: Dockerfile
    image: edusubmit/auth-service:latest
    container_name: edusubmit-auth
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/edusubmit
    networks:
      - edusubmit-net
    restart: unless-stopped

  api-gateway:
    build:
      context: ./edusubmit-backend/api-gateway
      dockerfile: Dockerfile
    image: edusubmit/api-gateway:latest
    container_name: edusubmit-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - edusubmit-net
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: edusubmit-mysql
    mem_limit: 512m
    environment:
      MYSQL_ROOT_PASSWORD: edusubmit_root_pass
      MYSQL_DATABASE: edusubmit
      MYSQL_USER: edusubmit
      MYSQL_PASSWORD: edusubmit_pass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pedusubmit_root_pass"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── Redis Cache ───
  redis:
    image: redis:7-alpine
    container_name: edusubmit-redis
    mem_limit: 512m
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── EduSubmit Backend (API + Frontend) ───
  edusubmit-backend:
    image: koorkon/edusubmit-backend:latest
    container_name: edusubmit-backend
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: mysql://edusubmit:edusubmit_pass@mysql:3306/edusubmit
      JWT_SECRET: LWh7Ca6nmTEKILVefBiCv8f8Dyl8ICj7QbeUTDQBz3F6bAfFKZPTeUneI58V58j5tMnn6KaNb49ePegg5LmBjQ==
      APP_SECRET: 1029384756 # <--- ADD THIS LINE
      AI_ENGINE_URL: http://ai-engine:5000
      UPLOAD_DIR: /app/uploads
      APP_ID: 12345
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/trpc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── AI Engine ───
  ai-engine:
    image: koorkon/edusubmit-ai-engine:latest
    container_name: edusubmit-ai
    environment:
      PORT: "5000"
      DEBUG: "false"
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"] # Change '/metrics' to '/'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── Prometheus ───
  prometheus:
    image: prom/prometheus:latest
    container_name: edusubmit-prometheus
    mem_limit: 512m
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── Grafana ───
  grafana:
    image: grafana/grafana:latest
    container_name: edusubmit-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3001"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    ports:
      - "3001:3001"
    depends_on:
      - prometheus
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── Elasticsearch ───
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: edusubmit-elasticsearch
    mem_limit: 768m
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── Logstash ───
  logstash:
    image: logstash:8.11.0
    volumes:
      - /home/koorkon/logstash_config/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    volumes:
      - type: bind
        source: ./elk/logstash/logstash.conf
        target: /usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch
    networks:
      - edusubmit-net
    restart: unless-stopped

  # ─── Kibana ───
  kibana:
    image: kibana:8.11.0
    container_name: edusubmit-kibana
    mem_limit: 512m
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - NODE_OPTIONS=--openssl-legacy-provider
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - edusubmit-net
    restart: unless-stopped

networks:
  edusubmit-net:
    driver: bridge

volumes:
  mysql_data:
  grafana_data:
  prometheus_data:
  elasticsearch_data:
  uploads: