version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: edusubmit-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: edusubmit
      MYSQL_USER: edusubmit_user
      MYSQL_PASSWORD: edusubmit_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./edusubmit-backend/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - edusubmit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "edusubmit_user", "-pedusubmit_password"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: edusubmit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - edusubmit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # API Gateway
  api-gateway:
    build:
      context: ./edusubmit-backend
      dockerfile: Dockerfile
      target: api-gateway
    container_name: edusubmit-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: edusubmit
      MYSQL_USER: edusubmit_user
      MYSQL_PASSWORD: edusubmit_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edusubmit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Auth Service
  auth-service:
    build:
      context: ./edusubmit-backend
      dockerfile: Dockerfile
      target: auth-service
    container_name: edusubmit-auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: edusubmit
      MYSQL_USER: edusubmit_user
      MYSQL_PASSWORD: edusubmit_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edusubmit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Frontend
  frontend:
    build:
      context: ./edusubmit-frontend
      dockerfile: Dockerfile
    container_name: edusubmit-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_BASE_URL: http://localhost:8080
      REACT_APP_AUTH_BASE_URL: http://localhost:8081
    depends_on:
      api-gateway:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - edusubmit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  mysql_data:
  redis_data:

networks:
  edusubmit-network:
    driver: bridge
