name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/edusubmit
            git pull origin main
            docker-compose up -d --build
            sleep 10
            curl -f http://localhost:3000/api/trpc/ping && echo "✅ Deployed"