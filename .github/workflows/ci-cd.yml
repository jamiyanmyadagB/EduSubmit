name: EduSubmit Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run --reporter=verbose
        env:
          NODE_ENV: test
          DATABASE_URL: mysql://test:test@localhost:3306/test
          JWT_SECRET: test-secret
          APP_ID: test
          APP_SECRET: test

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/edusubmit-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v5
        with:
          context: ./ai-engine
          file: ./ai-engine/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/edusubmit-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}      # Must be your Public IP or DNS
          username: ubuntu                    # Usually 'ubuntu' for EC2
          key: ${{ secrets.EC2_SSH_KEY }}     # Private SSH Key
          port: 22
          script: |
            cd /home/ubuntu/edusubmit
            # Ensure these commands exist and the user has permissions
            git pull origin main
            docker-compose pull
            docker-compose up -d --build