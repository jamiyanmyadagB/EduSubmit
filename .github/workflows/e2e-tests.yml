name: E2E Selenium Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Run E2E Selenium Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Start frontend in background
        working-directory: ./frontend
        run: |
          npm start &
          echo $! > frontend.pid
          sleep 30

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Set up ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Run E2E tests
        working-directory: ./backend/e2e-tests
        run: mvn clean test -Dbrowser=chrome -Dheadless=true -DbaseUrl=http://localhost:3000

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-reports
          path: backend/e2e-tests/target/extent-reports/
          retention-days: 30

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: backend/e2e-tests/target/screenshots/
          retention-days: 30

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: backend/e2e-tests/target/test-logs/
          retention-days: 30

      - name: Kill frontend process
        if: always()
        run: |
          if [ -f frontend/frontend.pid ]; then
            kill $(cat frontend/frontend.pid) || true
            rm frontend/frontend.pid
          fi

  e2e-tests-firefox:
    name: Run E2E Tests on Firefox
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Start frontend in background
        working-directory: ./frontend
        run: |
          npm start &
          echo $! > frontend.pid
          sleep 30

      - name: Set up Firefox
        uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: latest

      - name: Set up GeckoDriver
        uses: browser-actions/setup-geckodriver@v1

      - name: Run E2E tests on Firefox
        working-directory: ./backend/e2e-tests
        run: mvn clean test -Dbrowser=firefox -Dheadless=true -DbaseUrl=http://localhost:3000

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-reports-firefox
          path: backend/e2e-tests/target/extent-reports/
          retention-days: 30

      - name: Kill frontend process
        if: always()
        run: |
          if [ -f frontend/frontend.pid ]; then
            kill $(cat frontend/frontend.pid) || true
            rm frontend/frontend.pid
          fi
