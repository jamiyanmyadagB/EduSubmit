# EduSubmit Security Scan Workflow
# This workflow runs comprehensive security scans on the codebase
# It can be triggered manually or on schedule

name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

jobs:
  # ============================================
  # JOB 1: Snyk Dependency Scan (Backend)
  # Scans Maven dependencies for vulnerabilities
  # ============================================
  snyk-backend:
    name: Snyk Scan - Backend
    runs-on: ubuntu-latest
    if: secrets.SNYK_TOKEN != ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Snyk scan for backend
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-backend.sarif
          command: monitor

      - name: Upload Snyk results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-backend.sarif

  # ============================================
  # JOB 2: Snyk Dependency Scan (Frontend)
  # Scans npm dependencies for vulnerabilities
  # ============================================
  snyk-frontend:
    name: Snyk Scan - Frontend
    runs-on: ubuntu-latest
    if: secrets.SNYK_TOKEN != ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Snyk scan for frontend
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-frontend.sarif --file=frontend/package.json
          command: monitor

      - name: Upload Snyk results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-frontend.sarif

  # ============================================
  # JOB 3: Trivy File System Scan
  # Scans the entire codebase for vulnerabilities
  # ============================================
  trivy-fs-scan:
    name: Trivy File System Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'

      - name: Check for critical vulnerabilities
        run: |
          if grep -q '"level": "critical"' trivy-fs-results.sarif; then
            echo "❌ CRITICAL vulnerabilities found!"
            exit 1
          fi
          if grep -q '"level": "high"' trivy-fs-results.sarif; then
            echo "⚠️ HIGH vulnerabilities found - review required"
          fi
          echo "✅ No CRITICAL vulnerabilities found"

  # ============================================
  # JOB 4: CodeQL Analysis
  # Runs GitHub's CodeQL for code security analysis
  # ============================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    strategy:
      fail-fast: false
      matrix:
        language: [ 'java', 'javascript' ]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  # ============================================
  # JOB 5: OWASP Dependency Check
  # Runs OWASP Dependency Check for known vulnerabilities
  # ============================================
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run OWASP Dependency Check (Backend)
        working-directory: ./backend
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DskipTests

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: backend/target/dependency-check-report.html
          retention-days: 30

  # ============================================
  # JOB 6: Secret Scan
  # Scans for leaked secrets in the codebase
  # ============================================
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy for secret scanning
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-secrets-results.sarif'
          severity: 'CRITICAL,HIGH'
          hide-progress: false
          exit-code: '1'

      - name: Upload secret scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-secrets-results.sarif'

  # ============================================
  # JOB 7: Security Summary
  # Generates a summary of all security scans
  # ============================================
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [snyk-backend, snyk-frontend, trivy-fs-scan, codeql, owasp-dependency-check, secret-scan]
    if: always()
    
    steps:
      - name: Generate security summary
        run: |
          echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Snyk Backend**: ${{ needs.snyk-backend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Snyk Frontend**: ${{ needs.snyk-frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trivy FS Scan**: ${{ needs.trivy-fs-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **CodeQL**: ${{ needs.codeql.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **OWASP Dependency Check**: ${{ needs.owasp-dependency-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Secret Scan**: ${{ needs.secret-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Overall Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.snyk-backend.result }}" == "success" ] && \
             [ "${{ needs.snyk-frontend.result }}" == "success" ] && \
             [ "${{ needs.trivy-fs-scan.result }}" == "success" ] && \
             [ "${{ needs.codeql.result }}" == "success" ] && \
             [ "${{ needs.owasp-dependency-check.result }}" == "success" ] && \
             [ "${{ needs.secret-scan.result }}" == "success" ]; then
            echo "✅ All security scans passed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some security scans failed - review required" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
