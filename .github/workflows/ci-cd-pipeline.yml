name: EduSubmit CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Build & Test Stage
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build and Test
      run: |
        cd edusubmit-backend
        mvn clean verify

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-results
        path: |
          edusubmit-backend/**/target/surefire-reports/
          edusubmit-backend/**/target/failsafe-reports/

  # Code Quality Stage (SonarQube)
  code-quality:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: secrets.SONAR_TOKEN != ''
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: SonarQube Analysis
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        cd edusubmit-backend
        mvn sonar:sonar \
          -Dsonar.projectKey=edusubmit-backend \
          -Dsonar.organization=edusubmit-backend \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  # Security Scan Stage
  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Check for critical vulnerabilities
      run: |
        if grep -q '"level": "critical"' trivy-results.sarif; then
          echo "CRITICAL vulnerabilities found!"
          exit 1
        fi
        if grep -q '"level": "high"' trivy-results.sarif; then
          echo "HIGH vulnerabilities found!"
          exit 1
        fi
        echo "No CRITICAL or HIGH vulnerabilities found"

  # Docker Build & Push Stage
  docker-build-push:
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./edusubmit-backend
        file: ./edusubmit-backend/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/edusubmit/backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

    - name: Verify Docker Image
      run: |
        echo "Docker image ${{ secrets.DOCKER_USERNAME }}/edusubmit/backend:latest pushed successfully"
        docker pull ${{ secrets.DOCKER_USERNAME }}/edusubmit/backend:latest
        docker run --rm ${{ secrets.DOCKER_USERNAME }}/edusubmit/backend:latest echo "Image verification successful"
