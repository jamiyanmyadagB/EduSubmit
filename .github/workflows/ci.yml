name: EduSubmit CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - name: Type check
        run: npm run check
        continue-on-error: true
      - name: Run tests
        run: npm test -- --reporter=verbose
        env:
          NODE_ENV: test
          DATABASE_URL: mysql://test:test@localhost:3306/test
          JWT_SECRET: test-secret
          APP_ID: test
          APP_SECRET: test
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: mysql://test:test@localhost:3306/test
          JWT_SECRET: test-secret
          APP_ID: test
          APP_SECRET: test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: coverage/
          retention-days: 7