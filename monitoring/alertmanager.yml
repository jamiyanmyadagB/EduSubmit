# ═══════════════════════════════════════════
# Alertmanager Configuration
# Routes alerts to PagerDuty (critical) and Email (warning)
# ═══════════════════════════════════════════

global:
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "alerts@edusubmit.com"

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    # Critical alerts → PagerDuty
    - match:
        severity: critical
      receiver: pagerduty-critical
      continue: true
    # Warning alerts → Email
    - match:
        severity: warning
      receiver: email-warning
      continue: true

receivers:
  - name: default
    email_configs:
      - to: "admin@edusubmit.com"
        subject: "[EduSubmit Alert] {{ .GroupLabels.alertname }}"
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          Time: {{ .StartsAt }}
          {{ end }}

  - name: pagerduty-critical
    pagerduty_configs:
      - service_key: "YOUR_PAGERDUTY_KEY"
        description: "{{ .CommonAnnotations.summary }}"
        severity: critical
        details:
          firing: "{{ template \"pagerduty.default.description\" . }}"

  - name: email-warning
    email_configs:
      - to: "admin@edusubmit.com"
        from: "alerts@edusubmit.com"
        subject: "[EduSubmit Warning] {{ .GroupLabels.alertname }}"
        body: |
          {{ range .Alerts }}
          Warning: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Instance: {{ .Labels.instance }}
          Time: {{ .StartsAt }}
          {{ end }}

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]
