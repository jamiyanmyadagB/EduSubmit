# Selenium E2E Test Configuration

# Browser Configuration
browser=chrome
headless=false
browser.width=1920
browser.height=1080

# Environment Configuration
environment=dev
base.url=http://localhost:3000
api.url=http://localhost:8080

# Timeouts (in seconds)
implicit.wait=10
explicit.wait=30
page.load.timeout=30
script.timeout=30

# Test Data
test.user.student.email=student.test@lpu.in
test.user.student.password=Test@12345
test.user.teacher.email=teacher.test@lpu.in
test.user.teacher.password=Test@12345
test.user.admin.email=admin.test@lpu.in
test.user.admin.password=Admin@12345

# Screenshot Configuration
screenshot.on.failure=true
screenshot.directory=target/screenshots

# Report Configuration
report.directory=target/test-reports
extent.report.directory=target/extent-reports

# Parallel Execution
parallel.execution=false
thread.count=1

# Retry Configuration
retry.count=0

# Database Configuration (for test data setup)
test.db.url=jdbc:mysql://localhost:3306/edusubmit_test
test.db.username=root
test.db.password=root
