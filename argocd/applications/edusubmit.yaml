apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edusubmit
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app: edusubmit
spec:
  project: default
  source:
    repoURL: https://github.com/jamiyanmyadagB/EduSubmit.git
    targetRevision: main
    path: k8s/
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: edusubmit-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
