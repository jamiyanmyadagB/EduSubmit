apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edusubmit
  namespace: argocd
  labels:
    app: edusubmit
    environment: staging
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/edusubmit-k8s-manifests.git
    targetRevision: HEAD
    path: staging
  destination:
    server: https://kubernetes.default.svc
    namespace: edusubmit-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
  revisionHistoryLimit: 3
