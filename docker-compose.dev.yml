# Docker Compose for Local Development
# This configuration is optimized for local development with hot-reload and debugging enabled
# Usage: docker-compose -f docker-compose.dev.yml up

version: '3.8'

services:
  # MySQL Database
  # Primary relational database for the application
  mysql:
    image: mysql:8.0
    container_name: edusubmit-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-edusubmit}
      MYSQL_USER: ${MYSQL_USER:-edusubmit_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-edusubmit_password}
    ports:
      - "${MYSQL_PORT:-3307}:3306"  # Different port to avoid conflicts with production
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./edusubmit-backend/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - edusubmit-dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-edusubmit_user}", "-p${MYSQL_PASSWORD:-edusubmit_password}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis for caching and rate limiting
  # In-memory data store for session management and caching
  redis:
    image: redis:7-alpine
    container_name: edusubmit-redis-dev
    ports:
      - "${REDIS_PORT:-6380}:6379"  # Different port to avoid conflicts with production
    volumes:
      - redis_data_dev:/data
    networks:
      - edusubmit-dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO Object Storage
  # S3-compatible object storage for file uploads and assignments
  minio:
    image: minio/minio:latest
    container_name: edusubmit-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data_dev:/data
    networks:
      - edusubmit-dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # API Gateway (Development Mode)
  # Main entry point for all API requests with hot-reload enabled
  api-gateway:
    build:
      context: ./edusubmit-backend
      dockerfile: Dockerfile
      target: builder  # Use builder stage for development
    container_name: edusubmit-api-gateway-dev
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev  # Development profile
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-edusubmit}
      MYSQL_USER: ${MYSQL_USER:-edusubmit_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-edusubmit_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      # Enable Spring Boot DevTools for hot-reload
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "true"
    volumes:
      # Mount source code for hot-reload
      - ./edusubmit-backend/api-gateway/src:/app/api-gateway/src
      - ./edusubmit-backend/shared/src:/app/shared/src
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - edusubmit-dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Auth Service (Development Mode)
  # Handles user authentication with hot-reload enabled
  auth-service:
    build:
      context: ./edusubmit-backend
      dockerfile: Dockerfile
      target: builder  # Use builder stage for development
    container_name: edusubmit-auth-service-dev
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev  # Development profile
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-edusubmit}
      MYSQL_USER: ${MYSQL_USER:-edusubmit_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-edusubmit_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      # Enable Spring Boot DevTools for hot-reload
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "true"
    volumes:
      # Mount source code for hot-reload
      - ./edusubmit-backend/auth-service/src:/app/auth-service/src
      - ./edusubmit-backend/shared/src:/app/shared/src
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edusubmit-dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # AI Engine (Development Mode)
  # Python Flask service with hot-reload enabled
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: edusubmit-ai-engine-dev
    ports:
      - "${AI_ENGINE_PORT:-5000}:5000"
    environment:
      FLASK_ENV: development  # Development mode
      DEBUG: True  # Enable debug mode
      PYTHONUNBUFFERED: 1
      FLASK_DEBUG: 1  # Enable Flask debug mode
    volumes:
      # Mount source code for hot-reload
      - ./ai-engine:/app
    depends_on:
      - mysql
      - redis
    networks:
      - edusubmit-dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Frontend (Development Mode)
  # React application with hot-reload enabled
  frontend:
    build:
      context: ./edusubmit-frontend
      dockerfile: Dockerfile
      target: builder  # Use builder stage for development
    container_name: edusubmit-frontend-dev
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:8080}
      REACT_APP_AUTH_BASE_URL: ${REACT_APP_AUTH_BASE_URL:-http://localhost:8081}
      CHOKIDAR_USEPOLLING: "true"  # Enable file watching in Docker
      WATCHPACK_POLLING: "true"  # Enable webpack polling
    volumes:
      # Mount source code for hot-reload
      - ./edusubmit-frontend/src:/app/src
      - ./edusubmit-frontend/public:/app/public
      - /app/node_modules  # Preserve node_modules
    depends_on:
      api-gateway:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      ai-engine:
        condition: service_healthy
    networks:
      - edusubmit-dev-network
    restart: unless-stopped
    # Override command to run React in development mode
    command: ["npm", "start"]

  # Prometheus (Development Mode)
  # Metrics collection and monitoring system
  prometheus:
    image: prom/prometheus:latest
    container_name: edusubmit-prometheus-dev
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data_dev:/prometheus
    networks:
      - edusubmit-dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Grafana (Development Mode)
  # Visualization and dashboard platform for metrics
  grafana:
    image: grafana/grafana:latest
    container_name: edusubmit-grafana-dev
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: ${GRAFANA_ALLOW_SIGN_UP:-true}  # Allow sign-up in dev
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"  # Install additional plugins
    volumes:
      - grafana_data_dev:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - edusubmit-dev-network
    restart: unless-stopped
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

# Named volumes for data persistence (separate from production)
volumes:
  mysql_data_dev:
    driver: local
  redis_data_dev:
    driver: local
  minio_data_dev:
    driver: local
  prometheus_data_dev:
    driver: local
  grafana_data_dev:
    driver: local

# Custom network for service communication (separate from production)
networks:
  edusubmit-dev-network:
    driver: bridge
