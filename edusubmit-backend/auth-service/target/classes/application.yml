server:
  port: 8082

spring:
  application:
    name: auth-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/edusubmit?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: staging_user
    password: staging_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  sql:
    init:
      mode: always

eureka:
  client:
    service-url:
      defaultZone: http://eureka-staging:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.edusubmit.auth: DEBUG
    org.springframework.security: DEBUG
