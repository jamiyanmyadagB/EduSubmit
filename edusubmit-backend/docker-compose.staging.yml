services:

  mysql:
    image: mysql:8.0
    container_name: edusubmit-mysql-staging
    environment:
      MYSQL_ROOT_PASSWORD: staging_root_password
      MYSQL_DATABASE: edusubmit_staging
      MYSQL_USER: staging_user
      MYSQL_PASSWORD: staging_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_staging_data:/var/lib/mysql
    networks:
      - edusubmit-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: edusubmit-redis-staging
    ports:
      - "6379:6379"
    networks:
      - edusubmit-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: edusubmit-minio-staging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - edusubmit-network
    restart: unless-stopped

  eureka-staging:
    build:
      context: ./eureka-server
    container_name: edusubmit-eureka-staging
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: staging
    networks:
      - edusubmit-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
    container_name: edusubmit-api-gateway-staging
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: staging
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-staging:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/edusubmit_staging
      SPRING_DATASOURCE_USERNAME: staging_user
      SPRING_DATASOURCE_PASSWORD: staging_password
      SPRING_REDIS_HOST: redis
    depends_on:
      - mysql
      - redis
      - eureka-staging
    networks:
      - edusubmit-network
    restart: unless-stopped

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: edusubmit-auth-service-staging
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: staging
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-staging:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/edusubmit_staging
      SPRING_DATASOURCE_USERNAME: staging_user
      SPRING_DATASOURCE_PASSWORD: staging_password
    depends_on:
      - mysql
      - eureka-staging
    networks:
      - edusubmit-network
    restart: unless-stopped

  assignment-service:
    build:
      context: ./assignment-service
      dockerfile: Dockerfile
    container_name: edusubmit-assignment-service-staging
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: staging
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-staging:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/edusubmit_staging
      SPRING_DATASOURCE_USERNAME: staging_user
      SPRING_DATASOURCE_PASSWORD: staging_password
    depends_on:
      - mysql
      - eureka-staging
    networks:
      - edusubmit-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: edusubmit-prometheus
    ports:
      - "9090:9090"
    networks:
      - edusubmit-network

  grafana:
    image: grafana/grafana:latest
    container_name: edusubmit-grafana
    ports:
      - "3000:3000"
    networks:
      - edusubmit-network

volumes:
  mysql_staging_data:
  minio_data:

networks:
  edusubmit-network:
    driver: bridge