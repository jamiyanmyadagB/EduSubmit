input {
  beats {
    port => 5044
  }
}

filter {
  if [message] =~ "^\\{" {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
  mutate {
    add_field => {
      "service_name" => "%{[fields][service]}"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "edusubmit-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
